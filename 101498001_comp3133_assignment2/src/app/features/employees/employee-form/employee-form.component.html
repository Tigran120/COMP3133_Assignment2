<div class="container py-4">
  <div class="card shadow-sm mx-auto form-card">
    <div class="card-body p-4">
      <h1 class="h4 text-center mb-4">{{ isEdit ? 'Update Employee' : 'Add Employee' }}</h1>

      @if (errorMessage && !form.dirty) {
        <div class="alert alert-danger py-2">{{ errorMessage }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="first_name">First Name</label>
            <input
              id="first_name"
              type="text"
              class="form-control"
              formControlName="first_name"
              placeholder="First Name"
              [class.is-invalid]="form.controls.first_name.invalid && form.controls.first_name.touched"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="last_name">Last Name</label>
            <input
              id="last_name"
              type="text"
              class="form-control"
              formControlName="last_name"
              placeholder="Last Name"
              [class.is-invalid]="form.controls.last_name.invalid && form.controls.last_name.touched"
            />
          </div>
          <div class="col-12">
            <label class="form-label" for="email">Email Id</label>
            <input
              id="email"
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="Email Address"
              [class.is-invalid]="form.controls.email.invalid && form.controls.email.touched"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="gender">Gender</label>
            <select id="gender" class="form-select" formControlName="gender">
              @for (g of genders; track g) {
                <option [value]="g">{{ g }}</option>
              }
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="department">Department</label>
            <input id="department" type="text" class="form-control" formControlName="department" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="designation">Position (designation)</label>
            <input id="designation" type="text" class="form-control" formControlName="designation" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="salary">Salary</label>
            <input
              id="salary"
              type="number"
              class="form-control"
              formControlName="salary"
              min="1000"
              step="1"
            />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="date_of_joining">Date of joining</label>
            <input id="date_of_joining" type="date" class="form-control" formControlName="date_of_joining" />
          </div>
          <div class="col-12">
            <label class="form-label" for="photo">Profile picture</label>
            <input id="photo" type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)" />
            <div class="form-text">Optional. Requires Cloudinary env vars on the API for upload.</div>
          </div>
          @if (previewUrl || existingPhotoUrl) {
            <div class="col-12">
              <p class="small text-muted mb-1">Preview</p>
              <img [src]="previewUrl || existingPhotoUrl!" alt="Preview" class="preview rounded border" />
            </div>
          }
        </div>

        @if (errorMessage && form.dirty) {
          <div class="alert alert-danger py-2 mt-3 mb-0">{{ errorMessage }}</div>
        }

        <div class="d-flex gap-2 justify-content-center mt-4">
          <button type="button" class="btn btn-danger" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn btn-success" [disabled]="submitting">
            {{ submitting ? 'Saving…' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
